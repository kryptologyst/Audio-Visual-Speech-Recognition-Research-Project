name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff pytest pytest-cov
    
    - name: Run black formatter check
      run: black --check src/ scripts/ tests/ demo/
    
    - name: Run ruff linter
      run: ruff check src/ scripts/ tests/ demo/
    
    - name: Check import sorting
      run: ruff check --select I src/ scripts/ tests/ demo/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov
    
    - name: Run tests
      run: |
        pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  inference-test:
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest
    
    - name: Generate synthetic data
      run: |
        python scripts/generate_synthetic_data.py \
          --output-dir data/synthetic \
          --num-samples 10 \
          --seed 42
    
    - name: Run inference test
      run: |
        python -c "
        import sys
        sys.path.append('src')
        from models.avsr_model import AVSRModel
        from data import AudioVisualProcessor
        from utils import get_device
        import torch
        
        # Create model
        model = AVSRModel(vocab_size=100)
        model.eval()
        
        # Test inference
        audio_features = torch.randn(1, 100, 80)
        visual_features = torch.randn(1, 100, 3, 64, 64)
        
        predictions = model.transcribe(audio_features, visual_features)
        print(f'Inference test passed: {len(predictions)} predictions generated')
        "

  build-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install sphinx sphinx-rtd-theme
    
    - name: Build documentation
      run: |
        # Create basic documentation structure
        mkdir -p docs/source
        echo "# AVSR Project Documentation" > docs/source/index.rst
        echo "" >> docs/source/index.rst
        echo "Audio-Visual Speech Recognition Research Project" >> docs/source/index.rst
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run bandit security scan
      run: bandit -r src/ scripts/ -f json -o bandit-report.json || true
    
    - name: Run safety check
      run: safety check --json --output safety-report.json || true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  performance-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest-benchmark
    
    - name: Generate test data
      run: |
        python scripts/generate_synthetic_data.py \
          --output-dir data/performance \
          --num-samples 50 \
          --seed 42
    
    - name: Run performance tests
      run: |
        python -c "
        import sys
        sys.path.append('src')
        from models.avsr_model import AVSRModel
        import torch
        import time
        
        # Create model
        model = AVSRModel(vocab_size=100)
        model.eval()
        
        # Performance test
        audio_features = torch.randn(1, 200, 80)
        visual_features = torch.randn(1, 200, 3, 64, 64)
        
        # Warmup
        for _ in range(5):
            with torch.no_grad():
                _ = model.transcribe(audio_features, visual_features)
        
        # Benchmark
        start_time = time.time()
        for _ in range(10):
            with torch.no_grad():
                _ = model.transcribe(audio_features, visual_features)
        end_time = time.time()
        
        avg_time = (end_time - start_time) / 10
        print(f'Average inference time: {avg_time:.3f}s')
        
        # Check performance threshold (should be < 1s for this simple test)
        assert avg_time < 1.0, f'Performance test failed: {avg_time:.3f}s > 1.0s'
        print('Performance test passed!')
        "
