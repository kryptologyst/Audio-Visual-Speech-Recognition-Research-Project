# Base Audio-Visual Speech Recognition Configuration

# Model Configuration
model:
  name: "AVSRConformer"
  audio:
    input_dim: 80  # Mel-spectrogram features
    hidden_dim: 256
    num_layers: 6
    num_heads: 8
    dropout: 0.1
  
  visual:
    input_dim: 3  # RGB channels
    hidden_dim: 256
    num_layers: 4
    num_heads: 8
    dropout: 0.1
    image_size: [64, 64]
  
  fusion:
    method: "late"  # early, late, or attention
    hidden_dim: 512
    dropout: 0.1
  
  decoder:
    vocab_size: 1000
    hidden_dim: 512
    num_layers: 2
    dropout: 0.1

# Data Configuration
data:
  audio:
    sample_rate: 16000
    n_mels: 80
    n_fft: 1024
    hop_length: 256
    win_length: 1024
    fmin: 0
    fmax: 8000
  
  visual:
    fps: 25
    image_size: [64, 64]
    crop_margin: 0.1
  
  augmentation:
    audio:
      noise_prob: 0.3
      noise_snr_range: [5, 20]
      speed_perturb_prob: 0.3
      speed_range: [0.9, 1.1]
      spec_augment_prob: 0.5
      freq_mask_max: 27
      time_mask_max: 100
    
    visual:
      brightness_prob: 0.2
      contrast_prob: 0.2
      rotation_prob: 0.1
      rotation_range: [-5, 5]

# Training Configuration
training:
  batch_size: 16
  learning_rate: 1e-4
  weight_decay: 1e-6
  max_epochs: 100
  patience: 10
  gradient_clip_norm: 1.0
  
  optimizer:
    name: "adamw"
    betas: [0.9, 0.98]
    eps: 1e-9
  
  scheduler:
    name: "cosine"
    warmup_steps: 1000
    min_lr: 1e-6
  
  loss:
    name: "ctc"
    blank_token: 0
    reduction: "mean"

# Evaluation Configuration
evaluation:
  metrics:
    - "wer"
    - "cer"
    - "visual_contribution"
  
  beam_search:
    beam_size: 5
    length_penalty: 1.0
  
  confidence:
    temperature: 1.0
    top_k: 10

# Logging Configuration
logging:
  level: "INFO"
  log_every_n_steps: 100
  val_check_interval: 1000
  
  wandb:
    enabled: true
    project: "avsr-research"
    tags: ["avsr", "research"]
  
  tensorboard:
    enabled: true
    log_dir: "logs/tensorboard"

# Device Configuration
device:
  auto_detect: true
  fallback_order: ["cuda", "mps", "cpu"]
  mixed_precision: true

# Reproducibility
seed: 42
deterministic: true
